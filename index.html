<!DOCTYPE html>
<html>
<head>
    <title>Kỷ Niệm Sao Nhiệt Tình nk25</title>
    <style>
        /* 1. Thiết lập nền bầu trời */
        body { 
            margin: 0;
            padding: 20px;
            text-align: center;
            background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* 2. Hiệu ứng sao cánh hoa mềm mại */
        .star {
            position: absolute;
            /* Bí quyết: Dùng đường cong (path) thay vì đường thẳng (polygon) */
            clip-path: path('M 50 0 C 61 35 98 35 68 57 C 79 91 50 70 21 91 C 32 57 2 35 39 35 C 50 0 50 0 50 0 Z');
            
            /* Bo tròn bổ trợ */
            border-radius: 50%; 
            
            background: white;
            opacity: 0.8;
            pointer-events: none;
            animation: falling linear infinite;
        }

        @keyframes falling {
            0% {
                transform: translateY(-10vh) translateX(-20vw) scale(1);
                opacity: 0;
            }
            10% { opacity: 1; }
            100% {
                transform: translateY(110vh) translateX(80vw) scale(1.2);
                opacity: 0;
            }
        }

        /* 3. Bố cục ảnh kỷ niệm */
        .gallery { 
            display: flex; flex-wrap: wrap; justify-content: center; 
            gap: 30px; padding: 40px; align-items: flex-start;
        }
        
        img { 
            width: 300px; height: auto; border-radius: 15px; 
            box-shadow: 0 0 20px rgba(255,255,255,0.1);
            transition: 0.4s;
            border: 2px solid rgba(255,255,255,0.2);
        }

        img:hover { 
            transform: scale(1.05) translateY(-10px);
            box-shadow: 0 0 30px rgba(95, 145, 255, 0.5);
            border-color: #5f91ff;
        }

        h1 { font-size: 3em; color: #fff; text-shadow: 0 0 10px #5f91ff; }
    </style>
</head>
<body>
    <div id="star-container"></div>
    <h1>🌟 Sao Nhiệt Tình 🌟</h1>
    <p>cảm ơn bạn vì đã trở thành một thành viên trong gia đình nhỏ của chúng ta</p>

    <div class="gallery">
        <img src="anh1.jpg">
        <img src="anh2.jpg">
        <img src="anh3.jpg">
    </div> <script>
        const container = document.getElementById('star-container');
        const starCount = 30; // Số lượng ít cho đỡ rối mắt

        function getRandomHologramColor() {
            const hue = Math.random() * 360;
            return `hsl(${hue}, 100%, 85%)`; 
        }

        for (let i = 0; i < starCount; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            
            // Tăng kích thước sao to (4px - 16px)
            const sizeValue = Math.random() * 12 + 4; 
           const sizeValue = Math.random() * 20 + 10; 
        star.style.width = sizeValue + 'px';
        star.style.height = sizeValue + 'px';

            const left = Math.random() * 150 - 50 + 'vw'; 
            
            // Tốc độ cực chậm (60s - 90s cho 1 lần rơi)
            const duration = Math.random() * 30 + 60 + 's'; 
            const delay = Math.random() * -60 + 's';
            const color = getRandomHologramColor();

            star.style.opacity = Math.random() * 0.5 + 0.3; 
            star.style.animationDuration = duration;
            star.style.animationDelay = delay;
            star.style.left = left;
            star.style.background = color;

            const blur = sizeValue * 2 + 'px';
            star.style.boxShadow = `0 0 ${blur} ${color}, 0 0 ${sizeValue * 4}px ${color}`;

            container.appendChild(star);
        }
    </script>
</body>
</html>
