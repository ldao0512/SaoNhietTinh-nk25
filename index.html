<!DOCTYPE html>
<html>
<head>
    <title>Kỷ Niệm Sao Nhiệt Tình nk25</title>
    <style>
        /* 1. Tạo nền bầu trời đêm chuyển màu */
        body { 
            margin: 0;
            padding: 20px;
            text-align: center;
            background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* 2. Hiệu ứng sao rơi (Meteor) */
       .star {
    position: absolute;
    background: white; /* Ngôi sao mặc định màu trắng */
    border-radius: 50%; /* Làm cho ngôi sao hơi tròn, trông như điểm sáng */
    opacity: 0.8;
    pointer-events: none; /* Rất quan trọng để click được ảnh */
    animation: falling linear infinite;
    
    /* Thêm hiệu ứng lấp lánh (phồng ra thu vào) */
    box-shadow: 0 0 10px white, 0 0 20px white; /* Tạo quầng sáng lấp lánh */
}

@keyframes falling {
    0% {
        /* Bắt đầu ở trên cùng, lệch về bên trái một chút */
        transform: translateY(-10vh) translateX(-20vw) scale(1);
        opacity: 0;
    }
    10% {
        opacity: 1;
    }
    100% {
        /* Kết thúc ở dưới cùng, lệch sang bên phải */
        transform: translateY(110vh) translateX(80vw) scale(1.2);
        opacity: 0;
    }
}

        /* 3. Bố cục ảnh kỷ niệm */
        .gallery { 
            display: flex; flex-wrap: wrap; justify-content: center; 
            gap: 30px; padding: 40px; align-items: flex-start;
        }
        
        img { 
            width: 300px; height: auto; border-radius: 15px; 
            box-shadow: 0 0 20px rgba(255,255,255,0.1);
            transition: 0.4s;
            border: 2px solid rgba(255,255,255,0.2);
        }

        img:hover { 
            transform: scale(1.05) translateY(-10px);
            box-shadow: 0 0 30px rgba(95, 145, 255, 0.5);
            border-color: #5f91ff;
        }

        h1 { font-size: 3em; color: #fff; text-shadow: 0 0 10px #5f91ff; }
    </style>
</head>
<body>
  <div class="night" id="star-container">
    </div>
    <h1>🌟 Sao Nhiệt Tình 🌟</h1>
    <p>cảm ơn bạn vì đã trở thành một thành viên trong gia đình nhỏ của chúng ta</p>

    <div class="gallery">
        <img src="anh1.jpg">
        <img src="anh2.jpg">
        <img src="anh3.jpg">
    </div>
 <script>
    const container = document.getElementById('star-container');
    const starCount = 60; // Giảm 1/2 số lượng xuống còn 60 cho đỡ rối mắt

    function getRandomHologramColor() {
        const hue = Math.random() * 360;
        return `hsl(${hue}, 100%, 85%)`; // Màu nhạt hơn một chút cho dịu mắt
    }

    for (let i = 0; i < starCount; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        
        const sizeValue = Math.random() * 4 + 2; // Kích thước vừa phải
        const size = sizeValue + 'px'; 
        
        // Vị trí xuất hiện ngẫu nhiên bên trái và phía trên để rơi xéo
        const left = Math.random() * 150 - 50 + 'vw'; 
        
        // CHẬM LẠI 1/5: Tăng thời gian từ 15s đến 30s cho một vòng rơi
        const duration = Math.random() * 15 + 15 + 's'; 
        
        const delay = Math.random() * -30 + 's'; // Để sao rải rác sẵn
        const color = getRandomHologramColor();

        star.style.width = size;
        star.style.height = size;
        star.style.left = left;
        star.style.animationDuration = duration;
        star.style.animationDelay = delay;
        
        // Độ mờ thấp để không gây chói
        star.style.opacity = Math.random() * 0.4 + 0.2; 

        star.style.background = color;
        const blur = sizeValue * 2 + 'px';
        star.style.boxShadow = `0 0 ${blur} ${color}`;

        container.appendChild(star);
    }
</script>
