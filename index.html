<!DOCTYPE html>
<html>
<head>
    <title>Kỷ Niệm Sao Nhiệt Tình nk25</title>
    <style>
        /* 1. Tạo nền bầu trời đêm chuyển màu */
        body { 
            margin: 0;
            padding: 20px;
            text-align: center;
            background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* 2. Hiệu ứng sao rơi (Meteor) */
       .night {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: -1;
    overflow: hidden; /* Không cho sao bay ra ngoài màn hình */
}

.star {
    position: absolute;
    background-image: url('ngoisao.jpg'); /* Sử dụng ảnh của bạn */
    background-size: contain;
    background-repeat: no-repeat;
    opacity: 0.8;
    filter: hue-rotate(0deg); /* Để đổi màu hologram */
    animation: falling linear infinite;
}

@keyframes falling {
    0% {
        transform: translateY(-10vh) translateX(0) rotate(0deg);
        opacity: 1;
    }
    100% {
        transform: translateY(110vh) translateX(100px) rotate(360deg);
        opacity: 0.3;
    }
}

        /* 3. Bố cục ảnh kỷ niệm */
        .gallery { 
            display: flex; flex-wrap: wrap; justify-content: center; 
            gap: 30px; padding: 40px; align-items: flex-start;
        }
        
        img { 
            width: 300px; height: auto; border-radius: 15px; 
            box-shadow: 0 0 20px rgba(255,255,255,0.1);
            transition: 0.4s;
            border: 2px solid rgba(255,255,255,0.2);
        }

        img:hover { 
            transform: scale(1.05) translateY(-10px);
            box-shadow: 0 0 30px rgba(95, 145, 255, 0.5);
            border-color: #5f91ff;
        }

        h1 { font-size: 3em; color: #fff; text-shadow: 0 0 10px #5f91ff; }
    </style>
</head>
<body>
  <div class="night" id="star-container">
    </div>
    <h1>🌟 Kỷ Niệm Sao Nhiệt Tình 🌟</h1>
    <p>Nhiệm kỳ 2025 - Những ngôi sao tỏa sáng cùng nhau</p>

    <div class="gallery">
        <img src="anh1.jpg">
        <img src="anh2.jpg">
        <img src="anh3.jpg">
    </div>
    <script>
    const container = document.getElementById('star-container');
    const starCount = 100; // Số lượng ngôi sao bạn muốn

    for (let i = 0; i < starCount; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        
        // Tạo các thông số ngẫu nhiên
        const size = Math.random() * 30 + 10 + 'px'; // To nhỏ từ 10px - 40px
        const left = Math.random() * 100 + 'vw';     // Vị trí ngang ngẫu nhiên
        const duration = Math.random() * 3 + 2 + 's'; // Tốc độ rơi 2s - 5s
        const delay = Math.random() * 5 + 's';        // Thời gian chờ xuất hiện
        const hue = Math.random() * 360 + 'deg';      // Màu Hologram ngẫu nhiên

        // Áp dụng vào CSS của từng ngôi sao
        star.style.width = size;
        star.style.height = size;
        star.style.left = left;
        star.style.animationDuration = duration;
        star.style.animationDelay = delay;
        star.style.filter = `hue-rotate(${hue}) drop-shadow(0 0 5px white)`;

        container.appendChild(star);
    }
</script>
</body>
</html>
