<!DOCTYPE html>
<html>
<head>
    <title>Kỷ Niệm Sao Nhiệt Tình nk25</title>
    <style>
        /* 1. Tạo nền bầu trời đêm chuyển màu */
        body { 
            margin: 0;
            padding: 20px;
            text-align: center;
            background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* 2. Hiệu ứng sao rơi (Meteor) */
       .star {
    position: absolute;
    background: white; /* Ngôi sao mặc định màu trắng */
    border-radius: 50%; /* Làm cho ngôi sao hơi tròn, trông như điểm sáng */
    opacity: 0.8;
    pointer-events: none; /* Rất quan trọng để click được ảnh */
    animation: falling linear infinite;
    
    /* Thêm hiệu ứng lấp lánh (phồng ra thu vào) */
    box-shadow: 0 0 10px white, 0 0 20px white; /* Tạo quầng sáng lấp lánh */
}

@keyframes falling {
    0% {
        transform: translateY(-10vh) translateX(0) scale(1);
        opacity: 1;
    }
    50% {
        opacity: 0.5; /* Đến giữa đường thì mờ đi một chút để tạo cảm giác lấp lánh */
        transform: translateY(50vh) translateX(50px) scale(0.7); /* Thu nhỏ lại */
    }
    100% {
        transform: translateY(110vh) translateX(100px) scale(1.3); /* Cuối đường thì phồng ra */
        opacity: 0.2;
    }
}

        /* 3. Bố cục ảnh kỷ niệm */
        .gallery { 
            display: flex; flex-wrap: wrap; justify-content: center; 
            gap: 30px; padding: 40px; align-items: flex-start;
        }
        
        img { 
            width: 300px; height: auto; border-radius: 15px; 
            box-shadow: 0 0 20px rgba(255,255,255,0.1);
            transition: 0.4s;
            border: 2px solid rgba(255,255,255,0.2);
        }

        img:hover { 
            transform: scale(1.05) translateY(-10px);
            box-shadow: 0 0 30px rgba(95, 145, 255, 0.5);
            border-color: #5f91ff;
        }

        h1 { font-size: 3em; color: #fff; text-shadow: 0 0 10px #5f91ff; }
    </style>
</head>
<body>
  <div class="night" id="star-container">
    </div>
    <h1>🌟 Kỷ Niệm Sao Nhiệt Tình 🌟</h1>
    <p>Nhiệm kỳ 2025 - Những ngôi sao tỏa sáng cùng nhau</p>

    <div class="gallery">
        <img src="anh1.jpg">
        <img src="anh2.jpg">
        <img src="anh3.jpg">
    </div>
  <script>
    const container = document.getElementById('star-container');
    const starCount = 100; // Số lượng ngôi sao

    // Hàm tạo màu Hologram ngẫu nhiên (Dùng HSL để dễ kiểm soát)
    function getRandomHologramColor() {
        const hue = Math.random() * 360; // Màu sắc (0-360)
        return `hsl(${hue}, 100%, 80%)`; // Độ bão hòa cao, độ sáng cao để màu trông rực rỡ
    }

    for (let i = 0; i < starCount; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        
        // Tạo các thông số ngẫu nhiên
        const size = Math.random() * 5 + 2 + 'px'; // Nhỏ thôi (từ 2px - 7px) để trông như sao thật
        const left = Math.random() * 100 + 'vw';     // Vị trí ngang
        const duration = Math.random() * 5 + 3 + 's'; // Tốc độ rơi chậm (3s - 8s)
        const delay = Math.random() * -20 + 's';      // Sao đã rơi sẵn
        const color = getRandomHologramColor();       // Lấy màu ngẫu nhiên

        // Áp dụng vào CSS của từng ngôi sao
        star.style.width = size;
        star.style.height = size;
        star.style.left = left;
        star.style.animationDuration = duration;
        star.style.animationDelay = delay;
        
        // Gán màu nền và quầng sáng lấp lánh theo màu đó
        star.style.background = color;
        star.style.boxShadow = `0 0 10px ${color}, 0 0 20px ${color}`;

        container.appendChild(star);
    }
</script>
