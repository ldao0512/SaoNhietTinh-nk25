<!DOCTYPE html>
<html>
<head>
    <title>Kỷ Niệm Sao Nhiệt Tình nk25</title>
    <style>
        body { 
            font-family: 'Segoe UI', Mali; 
            text-align: center; 
            background-color: #f9f9f9; 
            margin: 0; 
            padding: 20px;
        }
        .gallery { 
            display: flex; 
            flex-wrap: wrap; 
            justify-content: center; 
            gap: 25px; 
            padding: 20px; 
            align-items: flex-start; /* Ảnh vuông hay dài đều giữ nguyên dáng */
        }
        img { 
            width: 300px; 
            height: auto;    /* Tuyệt chiêu chống méo ảnh */
            border-radius: 15px; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
            transition: 0.3s;
        }
        img:hover {
            transform: scale(1.05); /* Di chuột vào ảnh phóng to cho xịn */
        }
        h1 { color: #d63031; }
        p { color: #636e72; }
    </style>
</head>
<body>
    <h1>🌟 Kỷ Niệm Sao Nhiệt Tình - Nhiệm kỳ 2025 🌟</h1>
    <p>Nơi lưu giữ những khoảnh khắc của chúng ta!</p>

    <div class="gallery">
        <img src="anh1.jpg">
        <img src="anh2.jpg">
        <img src="anh3.jpg">
    </div>
</body>
</html>
